version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecotrash_postgres
    environment:
      POSTGRES_DB: ecotrash_server
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecotrash_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecotrash_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecotrash.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ecotrash_network

  # Service untuk menjalankan migrations
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: ecotrash_migrate
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=ecotrash_server
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - ecotrash_network
    profiles:
      - donotstart  # Jangan otomatis start, hanya saat dipanggil

volumes:
  postgres_data:
    driver: local

networks:
  ecotrash_network:
    driver: bridge
